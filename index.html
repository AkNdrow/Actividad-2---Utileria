<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria utileria</title>
    <style>
        code {
            color: #333;
            background-color: #f4f7f6;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-weight: bold;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 1.5rem 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 2rem;
            border-radius: 0.6rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 0.8rem 0;
        }

        a {
            text-decoration: none;
            color: #3498db;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        a:hover {
            color: #2980b9;
        }

        .file-link {
            display: block;
            padding: 0.8rem;
            background: #ecf0f1;
            border-radius: 0.3rem;
            border-left: 5px solid #3498db;
        }

        .file-link:hover {
            background: #e0e6ed;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Ejercicios de Programación Web</h1>
        <p>Andres Cuevas Garcia</p>
        <p>Si no cargan los ejercicios, refresque la pagina con <code>Ctrl + F5</code> o <code>Cmd + Shift + R</code>
            después de un par de minutos.</p>
        <ul>
            <li><a class="file-link" href="login.html">Registro</a></li>
            <li><a class="file-link" href="README.md">README</a></li>
        </ul>
    </div>
</body>

</html>
