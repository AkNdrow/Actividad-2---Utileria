<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/CSS/actividad2.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/JS/utileria.js"></script>
</head>

<body>
    <section>
        <div class="container">
            <h1 class="text-center">Registro de Usuario</h1>
            <p>Prueba de libreria customizada</p>
            <p style="color: rgb(0, 0, 0)">Rellena el formulario con tu información:</p>
            <form action="" class="form-control">
                <div id="Registro">
                    <label for="nombre" class="form-label" style="color: rgb(0, 0, 0)">Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre" class="form-control" style="margin-bottom: 2%">

                    <label for="apellido" class="form-label" style="color: rgb(0, 0, 0)">Apellido</label>
                    <input type="text" id="apellido" placeholder="Apellido" class="form-control"
                        style="margin-bottom: 2%">

                    <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento</label>
                    <input type="date" id="fechaNacimiento" class="form-control" style="margin-bottom: 2%">

                    <label for="correo" class="form-label">Correo</label>
                    <input type="email" id="correo" placeholder="Correo" class="form-control" style="margin-bottom: 2%">

                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" placeholder="Contraseña" class="form-control"
                        style="margin-bottom: 4%">

                    <button type="submit" class="btn btn-success" onclick="Validaciones(event)"
                        style="position: center; margin-left: 50%; padding: 5px;">Prueba</button>
                </div>
            </form>
        </div>
    </section>

</body>

</html>
